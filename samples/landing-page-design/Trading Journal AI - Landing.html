<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trading Journal AI — Review your trading like a journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #0b0d12; }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    .lnk { transition: color .15s ease; white-space: nowrap; }
    .lnk:hover { color: var(--ink) !important; }
    .btn-solid { transition: opacity .15s ease, transform .15s ease; white-space: nowrap; }
    .btn-solid:hover { opacity: .88; }
    .btn-ghost { transition: border-color .15s ease, background .15s ease; white-space: nowrap; }
    .btn-ghost:hover { border-color: var(--muted) !important; background: var(--surface); }
    ::selection { background: oklch(0.82 0.14 158 / 0.18); }
    @keyframes lf-blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes tj-growx { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    .lf-caret { animation: lf-blink 1.1s steps(1) infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#0b0d12"/>
      <circle cx="30" cy="30" r="5" fill="oklch(0.82 0.14 158)"/>
      <rect x="40" y="26" width="34" height="7" rx="2" fill="#242a35"/>
      <rect x="26" y="46" width="48" height="4" rx="2" fill="#414b58"/>
      <rect x="26" y="56" width="38" height="4" rx="2" fill="#414b58"/>
      <path d="M26 74 l8 -6 8 4 8 -10 8 5 8 -8" fill="none" stroke="oklch(0.82 0.14 158)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="journal-data.jsx"></script>
  <script type="text/babel" src="trades-flow-chart.jsx"></script>
  <script type="text/babel" src="landing-mocks.jsx"></script>
  <script type="text/babel" src="landing-features.jsx"></script>
  <script type="text/babel" src="landing.jsx"></script>
</body>
</html>
